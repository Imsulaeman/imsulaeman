name: Update profile

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y ffmpeg fonts-liberation
          pip install git+https://github.com/x0rzavi/github-readme-terminal.git@main requests pillow

      - name: Generate terminal gif
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIFOS_GENERAL_FPS: 13
          GIFOS_GENERAL_LOOP_COUNT: 4
          GIFOS_GENERAL_COLOR_SCHEME: "catppuccin-mocha"
          GIFOS_GENERAL_USER_NAME: "imsulaeman"
          GIFOS_FILES_OUTPUT_GIF_NAME: "terminal"

      - name: Generate chart and update README
        run: python update_readme.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git add terminal.gif chart.png README.md
          git -c "user.name=bot" -c "user.email=bot@github.com" commit -m "auto: daily profile update" || echo "nothing to commit"
          git push
