name: Update profile
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y fonts-liberation
          pip install requests pillow
      - name: Generate chart and update README
        run: python update_readme.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit and push
        run: |
          git add chart.png compounding.png README.md
          git -c "user.name=bot" -c "user.email=bot@github.com" commit -m "auto: daily profile update" || echo "nothing to commit"
          git push
